        const CLASSES_PY = `
class Player:
    def __init__(self, name, place):
        self.name = name
        self.place = place
        self.backpack = []
        self.wonMoney = False
        self.wonEstate = False
        self.night_time = False

    def look(self):
        result = 'You are currently in the ' + self.place.name + ". "
        if self.place.name == 'Closet':
            if not any(item.name == 'Flashlight' for item in self.backpack):
                result += "The room is too dark to see in and the only light has broken."
                print(result)
                return
            else:
                result += "The room is too dark to see in and the only light bulb has broken.\\nLuckily, you picked up the flashlight from earlier.\\nYou turn on your flashlight and it illuminates:\\n"
        else:
            result += "You take a look around and see:"
        print(result)
        if isinstance(self.place, Outside_Place) and self.night_time:
            print(self.place.night_description)
        else:
            print(self.place.description)
        if self.place.name == 'Observatory':
            print()
            if self.night_time:
                print("Now that it is the early morning you are able to look through the telescope at the celestial objects listed on the wall.\\nEventually you see an odd pattern emerging in the objects you're looking at.\\nFirst you see lots of double star clusters and binary stars which all look like an 8.\\nFurther down the list there was a variety thin or cigar-shaped galaxies reminding you of a 1.")
            else:
                print("Unfortunately you can't use the telescope right now because it is daytime.")
        if self.place.name == 'Lake' and any(item.name == 'RC' for item in self.backpack):
            print()
            print("You use the remote controller to drive the toy boat over to you. Sitting inside is a notepad with some scribbled numbers.\\nThough it has been partially damaged by the water you can make out part of the code --27.")
        print()
        self.place.look()

    def go_to(self, location):
        if type(location) != str:
            print('Location has to be a string.')
            return
        destination = self.place.get_neighbor(location)
        if destination is not self.place:
            if destination.locked:
                print(destination.name + ' is locked! You need to unlock it first.')
            else:
                self.place = destination
                self.look()

    def take(self, thing):
        if type(thing) != str:
            print('Thing should be a string.')
            return
        if thing in self.place.things:
            item = self.place.take(thing)
            self.backpack.append(item)
            print('You take the ' + item.name + '.')
        else:
            print(thing + ' is not here.')

    def check_backpack(self):
        if not self.backpack:
            print('Your backpack is empty.')
        else:
            for item in self.backpack:
                print(item.name, '-', item.description)

    def unlock(self, place):
        if type(place) != str:
            print("Place must be a string")
            return
        key = None
        for item in self.backpack:
            if isinstance(item, Key):
                key = item
                break
        if key is None:
            print("You don't have a key.")
            return
        if place not in self.place.exits:
            print("Can't find " + place + " nearby.")
            return
        destination = self.place.exits[place][0]
        if key.use(destination):
            self.backpack.remove(key)

    def keycode(self, code):
        if type(code) != str:
            print("Code must be a string")
            return
        if len(code) != 4:
            print("Code must be 4 digits")
            return
        if code == '8127':
            self.wonMoney = True
            print(WIN_MESSAGE_MONEY)
            if not self.wonEstate:
                print("Keep playing to get the estate.\\n\\n")
        elif code == '9018':
            self.wonEstate = True
            print(WIN_MESSAGE_ESTATE)
            if not self.wonMoney:
                print("Keep playing to get $100 million.\\n\\n")
        else:
            print("Unfortunately that is not the correct code")

    def meditate(self):
        self.night_time = True
        print("At first you sit uncomfortably on the cushion, unsure of what to do. As you slow down and focus on your breathing the world starts to\\n\\nfade away\\n\\nYou open your eyes and notice it's now dark out. Through the window you see stars twinkling up above.")


WIN_MESSAGE_MONEY = """
*******************************************************************

Congratulations! You have unlocked your inheritance of $100 million.

*******************************************************************

"""

WIN_MESSAGE_ESTATE = """
******************************************************************

Congratulations! You have unlocked your inheritance of the estate.

******************************************************************

"""


class Thing:
    def __init__(self, name, description):
        self.name = name
        self.description = description

    def use(self, place):
        print("You can't use a {0} here".format(self.name))


class Key(Thing):
    def use(self, place):
        if place.locked:
            place.locked = False
            print("Unlocked " + place.name)
            return True
        else:
            print(place.name + " is already unlocked")
            return False


class Place:
    def __init__(self, name, description, things):
        self.name = name
        self.description = description
        self.things = {thing.name: thing for thing in things}
        self.locked = False
        self.exits = {}

    def look(self):
        print()
        print('Things:')
        if not self.things:
            print('nothing in particular')
        else:
            for thing in self.things.values():
                print('   ', thing.name, '-', thing.description)
        self.check_exits()

    def get_neighbor(self, exit):
        if type(exit) != str:
            print('Exit has to be a string.')
            return self
        elif exit in self.exits:
            exit_place = self.exits[exit][0]
            return exit_place
        else:
            print("Can't go to {} from {}.".format(exit, self.name))
            print("Try looking around to see where to go.")
            return self

    def take(self, thing):
        return self.things.pop(thing)

    def check_exits(self):
        print()
        print('You can go to:')
        for exit in self.exits:
            print('   ', exit)

    def add_exits(self, places):
        for place in places:
            self.exits[place.name] = (place, place.description)
            place.exits[self.name] = (self, self.description)

    def add_oneway_exits(self, places):
        for place in places:
            self.exits[place.name] = (place, place.description)


class Outside_Place(Place):
    def __init__(self, name, description, night_description, things):
        super().__init__(name, description, things)
        self.night_description = night_description
`;

        const DATA_PY = `

        const ADVENTURE_PY = `
COMMAND_FORMATS = {
    'look': 'look',
    'go': 'go to [place]',
    'take': 'take [thing]',
    'check backpack': 'check backpack',
    'help': 'help',
    'unlock': 'unlock [place]',
    'keycode': 'keycode [code]',
    'meditate': 'meditate',
}

COMMAND_NUM_ARGS = {
    'look': 0,
    'go_to': 1,
    'take': 1,
    'check_backpack': 0,
    'help': 0,
    'unlock': 1,
    'keycode': 1,
    'meditate': 0,
}

def adv_help():
    print('There are {} possible commands:'.format(len(COMMAND_FORMATS)))
    for usage in COMMAND_FORMATS.values():
        print('   ', usage)

SPECIAL_FORMS = {
    'help': adv_help,
}

def adv_parse(line):
    tokens = line.split()
    if not tokens:
        raise SyntaxError('No command given')
    command = tokens.pop(0)
    if command == 'go':
        if not tokens or tokens[0] != 'to':
            raise SyntaxError('Did you mean "{}"?'.format(COMMAND_FORMATS[command]))
        return (command + '_to', ' '.join(tokens[1:]))
    elif command == 'check':
        if not tokens or tokens[0] != 'backpack':
            raise SyntaxError('Did you mean "{}"?'.format(COMMAND_FORMATS['check backpack']))
        return ('check_backpack', '')
    elif command == 'unlock':
        return ('unlock', ' '.join(tokens))
    elif command == 'keycode':
        if any(item.name == 'Lockbox' for item in me.backpack) or me.place == dining_room:
            return ('keycode', ' '.join(tokens))
        else:
            raise SyntaxError("Must be in the room with the lockbox to enter the code")
    elif command == 'meditate':
        if me.place != zendo:
            raise SyntaxError("You are not in the proper headspace to meditate")
        return ('meditate', '')
    else:
        return (command, ' '.join(tokens))

def adv_eval(exp):
    operator, operand = exp[0], exp[1]
    if operator not in COMMAND_NUM_ARGS:
        adv_help()
        raise SyntaxError('Invalid command: {}'.format(operator))
    elif operator in SPECIAL_FORMS:
        function = SPECIAL_FORMS[operator]
    else:
        function = getattr(me, operator)

    if COMMAND_NUM_ARGS[operator] == 0:
        function()
    else:
        function(operand)

def process_command(line):
    try:
        exp = adv_parse(line)
        adv_eval(exp)
        if me.wonMoney and me.wonEstate:
            print("\\nThank you for playing The Architect's Riddle.\\n")
            return "game_over"
    except SyntaxError as e:
        print('ERROR:', e)
    return "continue"
`;

        const WELCOME_MESSAGE = `Welcome to The Architect's Riddle

------------------------------------------------------------------------------------------------------------------------

You were left with the following:


Dear Heir,

You will only be receiving this message after I have died.
You are the heir to my expansive estate, but before you can claim it you must unlock the box sitting in front of you.
You might wonder why I have locked your inheritance behind a puzzle.
As an architect and buddhist I have always held the following two beliefs:
 - the world can be seen from many perspectives
 - everything is done with intent
I must ensure that whomever gains access to the wealth I have accumulated over my life will think the same.

Good luck,

Mrs. G
Renowned architect for the following projects: the Rising Fire house, the Entire Slate building, and the CisAmerica Pyramid

P.S. I will leave you with one hint. An architect's best friend is a piece of graph paper and a pencil.

`;

        let pyodide = null;
        let gameOver = false;

        async function main() {
            pyodide = await loadPyodide();

            // Redirect Python stdout to our terminal
            pyodide.runPython(`
import sys
from io import StringIO

class WebOutput:
    def __init__(self):
        self.buffer = ""
    def write(self, text):
        self.buffer += text
    def flush(self):
        pass
    def get_and_clear(self):
        result = self.buffer
        self.buffer = ""
        return result

_web_output = WebOutput()
sys.stdout = _web_output
sys.stderr = _web_output
`);

            // Load game modules
            pyodide.runPython(CLASSES_PY);
            pyodide.runPython(DATA_PY);
            pyodide.runPython(ADVENTURE_PY);

            // Show welcome and help
            loadingEl.style.display = 'none';
            terminalEl.style.display = 'block';
            appendOutput(WELCOME_MESSAGE);

            pyodide.runPython('adv_help()');
            const helpText = pyodide.runPython('_web_output.get_and_clear()');
            appendOutput(helpText + '\n');

            inputEl.focus();
        }

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !gameOver) {
                const command = inputEl.value.trim();
                inputEl.value = '';

                appendOutput('\nadventure> ' + command + '\n\n');

                if (!command) return;

                const status = pyodide.runPython(`process_command(${JSON.stringify(command)})`);
                const output = pyodide.runPython('_web_output.get_and_clear()');
                appendOutput(output);

                if (status === 'game_over') {
                    gameOver = true;
                    inputLine.classList.add('hidden');
                }

                terminalEl.scrollTop = terminalEl.scrollHeight;
            }
        });

        // Focus input when clicking anywhere in terminal
        terminalEl.addEventListener('click', function () {
            inputEl.focus();
        });

        main();
    </script>
