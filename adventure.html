<!doctype html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>The Architect's Riddle</title>
    <link href="https://fonts.googleapis.com/css?family=AR+One+Sans" rel="stylesheet" />
    <style>
        html {
            font-size: 1rem;
            font-family: "AR One Sans", sans-serif;
            background-color: black;
            color: azure;
        }

        a {
            color: #1262C3;
        }

        a:hover {
            color: rgb(0, 195, 185);
        }

        .page-header {
            text-align: center;
            padding: 1.5rem;
            background-size: cover;
            background-image: url("https://mrtinker64.github.io/images/space-banner.jpeg");
            background-position: center;
            background-color: #0800a5;
            margin: 0;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: white;
            text-shadow: 10px 5px 2.5px rgb(0, 0, 0);
            margin: 0;
        }

        .back-link {
            display: inline-block;
            margin: 1rem 2rem;
        }

        #loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: #aaa;
        }

        #terminal {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 1rem 2rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            min-height: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        #output {
            white-space: pre-wrap;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #d4d4d4;
        }

        #input-line {
            display: flex;
            align-items: center;
            margin-top: 0.5rem;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.95rem;
        }

        #input-line .prompt {
            color: #4ec9b0;
            margin-right: 0.5rem;
            white-space: nowrap;
        }

        #input-line input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #d4d4d4;
            font-family: "Courier New", Courier, monospace;
            font-size: 0.95rem;
            caret-color: #4ec9b0;
        }

        #input-line.hidden {
            display: none;
        }

        @media (max-width: 600px) {
            #terminal {
                margin: 0.5rem;
                padding: 0.75rem 1rem;
                max-height: 70vh;
            }

            #output, #input-line input, #input-line {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-header">
        <h1>The Architect's Riddle</h1>
    </div>

    <div id="loading">Loading Python runtime...</div>

    <div id="terminal" style="display:none;">
        <div id="output"></div>
        <div id="input-line">
            <span class="prompt">adventure&gt;</span>
            <input type="text" id="command-input" autocomplete="off" autofocus />
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script>
        const outputEl = document.getElementById('output');
        const inputEl = document.getElementById('command-input');
        const inputLine = document.getElementById('input-line');
        const terminalEl = document.getElementById('terminal');
        const loadingEl = document.getElementById('loading');

        function scrollToBottom() {
            terminalEl.scrollTop = terminalEl.scrollHeight;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function appendOutput(text) {
            outputEl.textContent += text;
            scrollToBottom();
        }

        let pyodide = null;
        let gameOver = false;

        async function main() {
            // Load Pyodide and fetch Python files in parallel
            const cacheBust = '?v=' + Date.now();
            const [pyodideInstance, classesCode, dataCode, adventureCode] = await Promise.all([
                loadPyodide(),
                fetch('adventure/classes.py' + cacheBust).then(r => r.text()),
                fetch('adventure/data.py' + cacheBust).then(r => r.text()),
                fetch('adventure/adventure.py' + cacheBust).then(r => r.text()),
            ]);
            pyodide = pyodideInstance;

            // Write the Python files to Pyodide's virtual filesystem
            pyodide.FS.writeFile('/home/pyodide/classes.py', classesCode);
            pyodide.FS.writeFile('/home/pyodide/data.py', dataCode);
            pyodide.FS.writeFile('/home/pyodide/adventure.py', adventureCode);

            // Redirect stdout to capture print output
            pyodide.runPython(`
import sys

class WebOutput:
    def __init__(self):
        self.buffer = ""
    def write(self, text):
        self.buffer += text
    def flush(self):
        pass
    def get_and_clear(self):
        result = self.buffer
        self.buffer = ""
        return result

_web_output = WebOutput()
sys.stdout = _web_output
sys.stderr = _web_output
`);

            // Import the game modules (classes -> data -> adventure)
            pyodide.runPython(`
sys.path.insert(0, '/home/pyodide')
from classes import *
from data import *
from adventure import *
`);

            // Define a process_command function for the web interface
            pyodide.runPython(`
def process_command(line):
    try:
        exp = adv_parse(line)
        adv_eval(exp)
        if me.wonMoney and me.wonEstate:
            print("\\nThank you for playing The Architect's Riddle.\\n")
            return "game_over"
    except SyntaxError as e:
        print('ERROR:', e)
    return "continue"
`);

            // Show welcome message and help
            loadingEl.style.display = 'none';
            terminalEl.style.display = 'block';

            pyodide.runPython('print(WELCOME_MESSAGE)');
            pyodide.runPython('help()');
            const startupText = pyodide.runPython('_web_output.get_and_clear()');
            appendOutput(startupText + '\n');

            inputEl.focus();
        }

        inputEl.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !gameOver) {
                const command = inputEl.value.trim();
                inputEl.value = '';

                appendOutput('\nadventure> ' + command + '\n\n');

                if (!command) return;

                const status = pyodide.runPython(`process_command(${JSON.stringify(command)})`);
                const output = pyodide.runPython('_web_output.get_and_clear()');
                appendOutput(output);

                if (status === 'game_over') {
                    gameOver = true;
                    inputLine.classList.add('hidden');
                }

                // scrollToBottom();
            }
        });

        // Focus input when clicking anywhere in terminal
        terminalEl.addEventListener('click', function () {
            inputEl.focus();
        });

        main();
    </script>
</body>

</html>
